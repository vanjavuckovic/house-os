<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>House OS</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="lockscreen">
  <div class="lockbox">
    <h1>🏠 House OS</h1>
    <p>Enter PIN</p>
    <input id="pinInput" type="password" maxlength="4" placeholder="••••"/>
    <button onclick="checkPIN()">Unlock</button>
    <p id="error"></p>
  </div>
</div>

<div id="app" class="hidden">

  <header>
    <h1>🏠 House OS – Dordtselaan</h1>
    <button onclick="logout()">Logout</button>
  </header>

  <nav>
    <button onclick="showTab('dashboard')">Dashboard</button>
    <button onclick="showTab('tasks')">Tasks</button>
    <button onclick="showTab('rooms')">Rooms</button>
    <button onclick="showTab('budget')">Budget</button>
    <button onclick="showTab('vve')">VvE</button>
    <button onclick="showTab('quotes')">Quotes</button>
    <button onclick="showTab('notes')">Notes</button>
  </nav>

  <main>

    <!-- DASHBOARD -->
    <section id="dashboard" class="tab">
      <h2>Dashboard</h2>
      <div id="stats"></div>
    </section>

    <!-- TASKS -->
    <section id="tasks" class="tab hidden">
      <h2>Tasks</h2>
      <input id="taskInput" placeholder="New task..."/>
      <button onclick="addTask()">Add</button>
      <div id="taskList"></div>
    </section>

    <!-- ROOMS -->
    <section id="rooms" class="tab hidden">
      <h2>Rooms</h2>
      <div id="roomList"></div>
    </section>

    <!-- BUDGET -->
    <section id="budget" class="tab hidden">
      <h2>Budget</h2>
      <input id="budgetItem" placeholder="Item"/>
      <input id="budgetAmount" placeholder="€"/>
      <button onclick="addBudget()">Add</button>
      <div id="budgetList"></div>
    </section>

    <!-- VVE -->
    <section id="vve" class="tab hidden">
      <h2>VvE Documents</h2>
      <input id="vveInput" placeholder="Document / note"/>
      <button onclick="addVVE()">Add</button>
      <div id="vveList"></div>
    </section>

    <!-- QUOTES -->
    <section id="quotes" class="tab hidden">
      <h2>Contractor Quotes</h2>
      <input id="quoteInput" placeholder="Quote"/>
      <button onclick="addQuote()">Add</button>
      <div id="quoteList"></div>
    </section>

    <!-- NOTES -->
    <section id="notes" class="tab hidden">
      <h2>Shared Notes</h2>
      <textarea id="notesArea" placeholder="Write everything here..."></textarea>
      <button onclick="saveNotes()">Save</button>
    </section>

  </main>

</div>  

<script src="app.js"></script>
</body>
</html>
